{% extends 'base.html' %}
{% block title %}登录{% endblock %}
{% block content %}
<div class="auth-page">
  <div class="auth-card">
    <div class="auth-logo">💻</div>
    <h2>欢迎回来</h2>
    <p class="auth-sub">登录到 TechHub 科技爱好者论坛</p>
    <form method="post" action="/login{% if request.args.get('next') %}?next={{ request.args.get('next') }}{% endif %}">
      <div class="form-group">
        <label>用户名</label>
        <input type="text" name="username" class="form-input" placeholder="你的用户名" required autofocus>
      </div>
      <div class="form-group">
        <label>密码</label>
        <input type="password" name="password" class="form-input" placeholder="••••••••" required>
      </div>
      <button type="submit" class="btn btn-primary" style="width:100%;padding:12px">登录</button>
    </form>
    <p class="auth-switch">还没有账号？<a href="/register">立即注册 →</a></p>
  </div>
</div>
{% endblock %}
