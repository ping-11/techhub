{% extends 'base.html' %}
{% block title %}注册{% endblock %}
{% block content %}
<div class="auth-page">
  <div class="auth-card">
    <div class="auth-logo">🚀</div>
    <h2>加入 TechHub</h2>
    <p class="auth-sub">与数千名科技爱好者一起探索技术世界</p>
    <form method="post" action="/register">
      <div class="form-group">
        <label>用户名</label>
        <input type="text" name="username" class="form-input" placeholder="只能包含字母、数字" maxlength="20" required autofocus>
      </div>
      <div class="form-group">
        <label>邮箱</label>
        <input type="email" name="email" class="form-input" placeholder="your@email.com" required>
      </div>
      <div class="form-group">
        <label>密码</label>
        <input type="password" name="password" class="form-input" placeholder="至少6位" required>
      </div>
      <div class="form-group">
        <label>确认密码</label>
        <input type="password" name="confirm" class="form-input" placeholder="再输一次" required>
      </div>
      <button type="submit" class="btn btn-primary" style="width:100%;padding:12px">🚀 注册账号</button>
    </form>
    <p class="auth-switch">已有账号？<a href="/login">立即登录 →</a></p>
  </div>
</div>
{% endblock %}
